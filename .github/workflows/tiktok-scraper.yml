name: TikTok Scraper

on:
  workflow_dispatch:
    inputs:
      keywords:
        description: 'Keywords to search (comma separated)'
        required: false
        default: 'farmersdefense,farmers defense,#farmersdefense,#farmersdefensegloves'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: |
          cd scraper
          npm install

      - name: Install Playwright browsers
        run: |
          cd scraper
          npx playwright install chromium --with-deps

      - name: Run TikTok scraper
        run: |
          cd scraper
          node index.js
        env:
          KEYWORDS: ${{ github.event.inputs.keywords }}
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
          FARMERSHARVEST_SHEET_ID: ${{ secrets.FARMERSHARVEST_SHEET_ID }}

      - name: Upload debug snapshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-snapshots
          path: scraper/debug-snapshots/
          retention-days: 3
          if-no-files-found: ignore

      - name: Done
        run: echo "Scraper finished, results written to Google Sheets"
